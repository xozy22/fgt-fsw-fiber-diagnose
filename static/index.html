<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortiSwitch Fiber Diagnose</title>
    <script src="/static/lib/jspdf.umd.min.js"></script>
    <script src="/static/lib/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #334155;
            --border: #475569;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --orange: #f97316;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header h1 { font-size: 1.25rem; font-weight: 600; }
        .header .subtitle { color: var(--text-muted); font-size: 0.875rem; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* --- Host List Panel --- */
        .host-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
        }

        .host-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .host-panel-header h2 {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .host-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
            height: fit-content;
        }

        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
        }

        .btn-secondary:hover { background: var(--border); }

        .btn-danger {
            background: transparent;
            color: var(--red);
            border: 1px solid var(--red);
        }

        .btn-danger:hover { background: rgba(239, 68, 68, 0.15); }

        .btn-success {
            background: var(--green);
        }

        .btn-success:hover { background: #16a34a; }

        .host-table-wrap {
            overflow-x: auto;
        }

        .host-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }

        .host-table th {
            padding: 0.5rem 0.75rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .host-table td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
            vertical-align: middle;
        }

        .host-table tbody tr:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        .host-table input[type="text"],
        .host-table input[type="password"] {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.3rem 0.5rem;
            color: var(--text);
            font-size: 0.8125rem;
            outline: none;
            width: 100%;
            min-width: 100px;
        }

        .host-table input:focus { border-color: var(--accent); }
        .host-table input::placeholder { color: var(--text-muted); }

        .host-table .col-actions { width: 140px; text-align: center; white-space: nowrap; }
        .host-table .col-check { width: 40px; text-align: center; }

        .action-btns {
            display: flex;
            gap: 0.375rem;
            justify-content: center;
        }

        .host-empty {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.8125rem;
        }

        /* --- Status Bar --- */
        .status-bar {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            display: none;
        }

        .status-bar.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--red);
            color: var(--red);
        }

        .status-bar.loading {
            display: block;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid var(--accent);
            color: var(--accent);
            position: relative;
            overflow: hidden;
        }

        .status-bar.loading .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: var(--accent);
            animation: indeterminate 1.8s ease-in-out infinite;
        }

        @keyframes indeterminate {
            0% { left: -30%; width: 30%; }
            50% { left: 50%; width: 40%; }
            100% { left: 100%; width: 30%; }
        }

        .status-bar .loading-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .elapsed-time {
            font-variant-numeric: tabular-nums;
            opacity: 0.8;
        }

        .status-text {
            flex: 1;
            text-align: left;
            line-height: 1.5;
        }

        .progress-host {
            color: var(--text);
            font-weight: 500;
        }

        .status-bar.success {
            display: block;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid var(--green);
            color: var(--green);
        }

        .results { margin-top: 1.5rem; }

        .switch-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .switch-header {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--border);
        }

        .switch-header:hover { background: var(--surface2); }

        .switch-header .arrow {
            transition: transform 0.2s;
            color: var(--text-muted);
        }

        .switch-header .arrow.open { transform: rotate(90deg); }
        .switch-header .switch-info { flex: 1; }
        .switch-header .switch-name { font-weight: 600; font-size: 1rem; }

        .switch-header .switch-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .switch-header .port-count {
            background: var(--surface2);
            border-radius: 12px;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .temp-badge {
            background: var(--surface2);
            border-radius: 12px;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            white-space: nowrap;
        }

        .temp-good { color: var(--green); }
        .temp-marginal { color: var(--yellow); }
        .temp-poor { color: var(--red); }

        .fgt-label {
            background: var(--accent);
            border-radius: 4px;
            padding: 0.125rem 0.5rem;
            font-size: 0.7rem;
            color: #fff;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .switch-body { display: none; padding: 0; }
        .switch-body.open { display: block; }

        .port-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }

        .port-table thead { background: var(--bg); }

        .port-table th {
            padding: 0.625rem 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .port-table td {
            padding: 0.625rem 1rem;
            border-bottom: 1px solid rgba(71, 85, 105, 0.4);
            vertical-align: middle;
        }

        .port-table tbody tr.port-row { cursor: pointer; }
        .port-table tbody tr.port-row:hover { background: rgba(59, 130, 246, 0.05); }
        .port-table tbody tr.port-detail:hover { background: transparent; }
        .port-table tbody tr:last-child td { border-bottom: none; }

        .port-detail { display: none; }
        .port-detail.open { display: table-row; }

        .port-detail td {
            padding: 0 1rem 0.75rem 1rem;
            border-bottom: 1px solid rgba(71, 85, 105, 0.4);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 0.75rem;
            padding: 0.5rem 0;
        }

        .detail-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.625rem 0.75rem;
        }

        .detail-card-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.375rem;
        }

        .detail-limits {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.25rem 1rem;
            font-size: 0.75rem;
        }

        .detail-limit-label {
            color: var(--text-muted);
        }

        .detail-limit-value {
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            text-align: right;
        }

        .detail-limit-value.alarm { color: var(--red); }
        .detail-limit-value.warn { color: var(--yellow); }
        .detail-limit-value.ok { color: var(--green); }

        .detail-current {
            margin-top: 0.375rem;
            padding-top: 0.375rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
        }

        .detail-current-label { color: var(--text-muted); }
        .detail-current-value { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; font-weight: 600; }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }

        .status-dot.up { background: var(--green); }
        .status-dot.down { background: var(--red); }
        .status-dot.unknown { background: var(--text-muted); }

        .power-value {
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.8125rem;
        }

        .power-bar { display: flex; align-items: center; gap: 0.5rem; }

        .power-bar-track {
            flex: 1;
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            position: relative;
            min-width: 80px;
            max-width: 150px;
        }

        .power-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .level-ok { color: var(--green); }
        .level-warn { color: var(--yellow); }
        .level-alarm { color: var(--red); }

        .bar-ok { background: var(--green); }
        .bar-warn { background: var(--yellow); }
        .bar-alarm { background: var(--red); }

        .vendor-info { color: var(--text-muted); font-size: 0.75rem; }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* --- Filter Bar --- */
        .filter-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-top: 1rem;
            display: none;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-bar.visible { display: flex; }

        .filter-bar label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-right: 0.25rem;
        }

        .filter-bar input[type="text"] {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.375rem 0.625rem;
            color: var(--text);
            font-size: 0.8125rem;
            outline: none;
            flex: 1;
            min-width: 180px;
        }

        .filter-bar input[type="text"]:focus { border-color: var(--accent); }
        .filter-bar input[type="text"]::placeholder { color: var(--text-muted); }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .filter-bar select {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.375rem 0.5rem;
            color: var(--text);
            font-size: 0.8125rem;
            outline: none;
            cursor: pointer;
        }

        .filter-bar select:focus { border-color: var(--accent); }

        .filter-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: auto;
            white-space: nowrap;
        }

        .port-row-hidden { display: none !important; }
        .switch-card-hidden { display: none !important; }

        .port-table th.sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
            padding-right: 1.25rem;
        }

        .port-table th.sortable:hover { color: var(--text); }

        .port-table th.sortable::after {
            content: '\2195';
            position: absolute;
            right: 0.25rem;
            opacity: 0.3;
            font-size: 0.65rem;
        }

        .port-table th.sort-asc::after { content: '\2191'; opacity: 0.8; }
        .port-table th.sort-desc::after { content: '\2193'; opacity: 0.8; }

        input[type="file"] { display: none; }

        .export-btns { margin-left: 0; }

        /* --- Dashboard --- */
        .dashboard {
            display: none;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .dashboard.visible {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        }

        .dash-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            text-align: center;
        }

        .dash-card-value {
            font-size: 1.75rem;
            font-weight: 700;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            line-height: 1.2;
        }

        .dash-card-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .dash-total .dash-card-value { color: var(--text); }
        .dash-ok .dash-card-value { color: var(--green); }
        .dash-ok { border-color: rgba(34, 197, 94, 0.3); }
        .dash-warn .dash-card-value { color: var(--yellow); }
        .dash-warn { border-color: rgba(234, 179, 8, 0.3); }
        .dash-alarm .dash-card-value { color: var(--red); }
        .dash-alarm { border-color: rgba(239, 68, 68, 0.3); }
        .dash-down .dash-card-value { color: var(--text-muted); }
        .dash-down { border-color: rgba(148, 163, 184, 0.3); }
        .dash-switches .dash-card-value { color: var(--accent); }

        @media (max-width: 900px) {
            .host-panel-header { flex-direction: column; align-items: flex-start; }
            .port-table { font-size: 0.75rem; }
            .port-table th, .port-table td { padding: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>FortiSwitch Fiber Diagnose</h1>
            <div class="subtitle">Transceiver Tx/Rx Leistungswerte via FortiLink</div>
        </div>
    </div>

    <div class="container">
        <!-- Host List Panel -->
        <div class="host-panel">
            <div class="host-panel-header">
                <h2>FortiGate Hosts</h2>
                <div class="host-actions">
                    <button class="btn btn-sm btn-secondary" onclick="addHostRow()">+ Host</button>
                    <button class="btn btn-sm btn-secondary" onclick="document.getElementById('csvInput').click()">CSV Import</button>
                    <button class="btn btn-sm btn-secondary" onclick="exportCsv()">CSV Export</button>
                    <button class="btn btn-sm btn-secondary" onclick="saveHosts()">Speichern</button>
                    <button class="btn btn-sm btn-secondary" onclick="loadHosts()">Laden</button>
                    <input type="file" id="csvInput" accept=".csv,.txt" onchange="importCsv(event)" />
                    <button class="btn btn-sm btn-success" onclick="diagnoseAll()">Alle abfragen</button>
                    <button class="btn btn-sm" onclick="diagnoseSelected()">Auswahl abfragen</button>
                </div>
            </div>
            <div class="host-table-wrap">
                <table class="host-table">
                    <thead>
                        <tr>
                            <th class="col-check"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)" /></th>
                            <th>Host</th>
                            <th>API Token</th>
                            <th>VDOM</th>
                            <th class="col-actions">Aktionen</th>
                        </tr>
                    </thead>
                    <tbody id="hostTableBody"></tbody>
                </table>
                <div class="host-empty" id="hostEmpty">
                    Keine Hosts konfiguriert. Host hinzufügen oder CSV importieren.
                </div>
            </div>
        </div>

        <div class="status-bar" id="statusBar"></div>

        <div class="dashboard" id="dashboard">
            <div class="dash-card dash-switches">
                <div class="dash-card-value" id="dashSwitches">0</div>
                <div class="dash-card-label">Switches</div>
            </div>
            <div class="dash-card dash-total">
                <div class="dash-card-value" id="dashTotal">0</div>
                <div class="dash-card-label">Fiber-Ports</div>
            </div>
            <div class="dash-card dash-ok">
                <div class="dash-card-value" id="dashOk">0</div>
                <div class="dash-card-label">OK</div>
            </div>
            <div class="dash-card dash-warn">
                <div class="dash-card-value" id="dashWarn">0</div>
                <div class="dash-card-label">Warning</div>
            </div>
            <div class="dash-card dash-alarm">
                <div class="dash-card-value" id="dashAlarm">0</div>
                <div class="dash-card-label">Alarm</div>
            </div>
            <div class="dash-card dash-down">
                <div class="dash-card-value" id="dashDown">0</div>
                <div class="dash-card-label">Down</div>
            </div>
        </div>

        <div class="filter-bar" id="filterBar">
            <input type="text" id="filterText" placeholder="Suche (Switch, Port, Vendor, S/N...)" oninput="applyFilters()" />
            <div class="filter-group">
                <label>Status</label>
                <select id="filterStatus" onchange="applyFilters()">
                    <option value="">Alle</option>
                    <option value="up">Up / OK</option>
                    <option value="down">Down / Error</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Level</label>
                <select id="filterLevel" onchange="applyFilters()">
                    <option value="">Alle</option>
                    <option value="ok">OK</option>
                    <option value="warn">Warning</option>
                    <option value="alarm">Alarm</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Vendor</label>
                <select id="filterVendor" onchange="applyFilters()">
                    <option value="">Alle</option>
                </select>
            </div>
            <span class="filter-count" id="filterCount"></span>
            <div class="filter-group export-btns">
                <button class="btn btn-sm btn-secondary" onclick="exportResultsCsv()">CSV Export</button>
                <button class="btn btn-sm btn-secondary" onclick="exportResultsPdf()">PDF Export</button>
            </div>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        let hosts = [];
        let hostIdCounter = 0;

        // --- Host Management ---

        function addHostRow(host = '', token = '', vdom = 'root') {
            syncHostValues();
            hosts.push({ id: ++hostIdCounter, host, token, vdom });
            renderHostTable();
        }

        function removeHost(id) {
            syncHostValues();
            hosts = hosts.filter(h => h.id !== id);
            renderHostTable();
        }

        function syncHostValues() {
            hosts.forEach(h => {
                const row = document.querySelector(`tr[data-id="${h.id}"]`);
                if (row) {
                    h.host = row.querySelector('.inp-host').value.trim();
                    h.token = row.querySelector('.inp-token').value.trim();
                    h.vdom = row.querySelector('.inp-vdom').value.trim() || 'root';
                }
            });
        }

        function getHostValues() {
            syncHostValues();
            return hosts;
        }

        function renderHostTable() {
            const tbody = document.getElementById('hostTableBody');
            const empty = document.getElementById('hostEmpty');
            empty.style.display = hosts.length === 0 ? 'block' : 'none';

            tbody.innerHTML = '';
            hosts.forEach(h => {
                const tr = document.createElement('tr');
                tr.dataset.id = h.id;
                tr.innerHTML = `
                    <td class="col-check"><input type="checkbox" class="host-check" /></td>
                    <td><input type="text" class="inp-host" value="${escAttr(h.host)}" placeholder="192.168.1.1" /></td>
                    <td><input type="password" class="inp-token" value="${escAttr(h.token)}" placeholder="API Token" /></td>
                    <td><input type="text" class="inp-vdom" value="${escAttr(h.vdom)}" placeholder="root" style="max-width:120px" /></td>
                    <td class="col-actions">
                        <div class="action-btns">
                            <button class="btn btn-sm" onclick="diagnoseSingle(${h.id})">Abfragen</button>
                            <button class="btn btn-sm btn-danger" onclick="removeHost(${h.id})">&#10005;</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function toggleSelectAll(cb) {
            document.querySelectorAll('.host-check').forEach(c => c.checked = cb.checked);
        }

        function getSelectedHostIds() {
            const ids = [];
            document.querySelectorAll('#hostTableBody tr').forEach(tr => {
                if (tr.querySelector('.host-check')?.checked) {
                    ids.push(parseInt(tr.dataset.id));
                }
            });
            return ids;
        }

        // --- CSV Import / Export ---

        function importCsv(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                parseCsv(text);
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function parseCsv(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            let added = 0;

            for (const line of lines) {
                // Skip header line
                if (/^host[,;].*token/i.test(line)) continue;

                const parts = line.split(/[,;]/).map(s => s.trim().replace(/^["']|["']$/g, ''));
                if (parts.length >= 2 && parts[0] && parts[1]) {
                    const host = parts[0];
                    const token = parts[1];
                    const vdom = parts[2] || 'root';
                    hosts.push({ id: ++hostIdCounter, host, token, vdom });
                    added++;
                }
            }

            renderHostTable();
            showStatus(`${added} Host(s) aus CSV importiert.`, 'success');
        }

        function exportCsv() {
            getHostValues();
            if (hosts.length === 0) {
                showStatus('Keine Hosts zum Exportieren.', 'error');
                return;
            }

            let csv = 'host;token;vdom\n';
            hosts.forEach(h => {
                csv += `${csvEscape(h.host)};${csvEscape(h.token)};${csvEscape(h.vdom)}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'fortigate_hosts.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        function csvEscape(val) {
            if (!val) return '';
            if (val.includes(';') || val.includes('"') || val.includes('\n')) {
                return '"' + val.replace(/"/g, '""') + '"';
            }
            return val;
        }

        // --- Save / Load (localStorage) ---

        const STORAGE_KEY = 'fgt_fiber_hosts';

        function saveHosts() {
            getHostValues();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(hosts.map(h => ({
                host: h.host, token: h.token, vdom: h.vdom
            }))));
            showStatus(`${hosts.length} Host(s) gespeichert.`, 'success');
        }

        function loadHosts() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (!data) {
                showStatus('Keine gespeicherten Hosts gefunden.', 'error');
                return;
            }

            try {
                const arr = JSON.parse(data);
                hosts = arr.map(h => ({
                    id: ++hostIdCounter,
                    host: h.host || '',
                    token: h.token || '',
                    vdom: h.vdom || 'root'
                }));
                renderHostTable();
                showStatus(`${hosts.length} Host(s) geladen.`, 'success');
            } catch (e) {
                showStatus('Fehler beim Laden der gespeicherten Daten.', 'error');
            }
        }

        // --- Diagnose ---

        async function diagnoseSingle(id) {
            getHostValues();
            const host = hosts.find(h => h.id === id);
            if (!host || !host.host || !host.token) {
                showStatus('Host und API-Token sind erforderlich.', 'error');
                return;
            }
            await runDiagnoseForHosts([host]);
        }

        async function diagnoseSelected() {
            getHostValues();
            const ids = getSelectedHostIds();
            if (ids.length === 0) {
                showStatus('Bitte mindestens einen Host auswählen.', 'error');
                return;
            }
            const selected = hosts.filter(h => ids.includes(h.id));
            await runDiagnoseForHosts(selected);
        }

        async function diagnoseAll() {
            getHostValues();
            const valid = hosts.filter(h => h.host && h.token);
            if (valid.length === 0) {
                showStatus('Keine gültigen Hosts konfiguriert.', 'error');
                return;
            }
            await runDiagnoseForHosts(valid);
        }

        async function runDiagnoseForHosts(hostList) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            allResultData = [];
            document.getElementById('filterBar').classList.remove('visible');
            document.getElementById('dashboard').classList.remove('visible');
            document.getElementById('filterText').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterLevel').value = '';
            document.getElementById('filterVendor').value = '';

            document.querySelectorAll('.btn').forEach(b => b.disabled = true);
            showStatus(`Abfrage von ${hostList.length} Host(s) parallel...`, 'loading');

            let totalSwitches = 0;
            let totalPorts = 0;
            let errors = 0;

            try {
                const resp = await fetch('/api/diagnose-stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        hosts: hostList.map(h => ({ host: h.host, token: h.token, vdom: h.vdom }))
                    })
                });

                if (!resp.ok) {
                    const data = await resp.json();
                    showStatus(data.error || 'Unbekannter Fehler', 'error');
                    document.querySelectorAll('.btn').forEach(b => b.disabled = false);
                    return;
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const msg = JSON.parse(line.slice(6));

                        if (msg.type === 'progress') {
                            updateProgress(msg.host, msg.step, msg.detail, hostList.length);
                        } else if (msg.type === 'result') {
                            const result = msg.data;
                            if (result.error) {
                                appendError(resultsDiv, result.host, result.error);
                                errors++;
                            } else if (result.switches && result.switches.length > 0) {
                                totalSwitches += result.switches.length;
                                totalPorts += result.switches.reduce((s, sw) => s + sw.ports.length, 0);
                                renderResults(result.switches, result.host, resultsDiv);
                            } else {
                                appendError(resultsDiv, result.host, 'Keine managed Switches mit Fiber-Ports gefunden.');
                            }
                        } else if (msg.type === 'complete') {
                            break;
                        }
                    }
                }
            } catch (e) {
                showStatus('Netzwerkfehler: ' + e.message, 'error');
                document.querySelectorAll('.btn').forEach(b => b.disabled = false);
                return;
            }

            document.querySelectorAll('.btn').forEach(b => b.disabled = false);

            if (errors > 0 && totalSwitches === 0) {
                showStatus(`Abfrage abgeschlossen mit ${errors} Fehler(n).`, 'error');
            } else {
                showStatus(
                    `${totalSwitches} Switch(es) mit ${totalPorts} Fiber-Port(s) gefunden.` +
                    (errors > 0 ? ` ${errors} Host(s) mit Fehlern.` : ''),
                    totalSwitches > 0 ? 'success' : 'error'
                );
            }
        }

        const hostProgress = {};
        function updateProgress(host, step, detail, totalHosts) {
            hostProgress[host] = { step, detail };
            const steps = Object.entries(hostProgress);
            const lines = steps.map(([h, s]) => `<span class="progress-host">${esc(h)}</span> ${esc(s.detail)}`);
            const statusText = document.querySelector('.loading-content .status-text');
            if (statusText) statusText.innerHTML = lines.join('<br>');
        }

        function appendError(container, host, message) {
            const div = document.createElement('div');
            div.className = 'switch-card';
            div.innerHTML = `
                <div class="switch-header" style="cursor:default">
                    <div class="switch-info">
                        <div class="switch-name" style="color:var(--red)">${esc(host)}</div>
                        <div class="switch-meta" style="color:var(--red)">${esc(message)}</div>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        // --- UI Helpers ---

        let elapsedTimer = null;

        function showStatus(msg, type) {
            const bar = document.getElementById('statusBar');
            bar.className = 'status-bar ' + type;
            clearInterval(elapsedTimer);
            elapsedTimer = null;

            if (type === 'loading') {
                const startTime = Date.now();
                for (const k in hostProgress) delete hostProgress[k];
                bar.innerHTML = `
                    <div class="loading-content">
                        <div class="spinner"></div>
                        <span class="status-text">${msg}</span>
                        <span class="elapsed-time" id="elapsedTime">0.0s</span>
                    </div>
                    <div class="progress-bar"></div>`;
                elapsedTimer = setInterval(() => {
                    const el = document.getElementById('elapsedTime');
                    if (el) el.textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
                }, 100);
            } else {
                bar.textContent = msg;
            }
        }

        let allResultData = []; // { fgtHost, switches[] }

        function renderResults(switches, fgtHost, container) {
            allResultData.push({ fgtHost, switches });

            switches.forEach(sw => {
                const searchBase = [sw.name, sw.switch_id, sw.serial, sw.os_version, fgtHost].join(' ').toLowerCase();

                const card = document.createElement('div');
                card.className = 'switch-card';
                card.dataset.searchbase = searchBase;

                const header = document.createElement('div');
                header.className = 'switch-header';
                header.innerHTML = `
                    <span class="arrow open">&#9654;</span>
                    <div class="switch-info">
                        <div class="switch-name">
                            ${esc(sw.name || sw.switch_id)}
                            <span class="fgt-label">${esc(fgtHost)}</span>
                        </div>
                        <div class="switch-meta">
                            S/N: ${esc(sw.serial)} &middot; ID: ${esc(sw.switch_id)}
                            ${sw.os_version ? ' &middot; FW: ' + esc(sw.os_version) : ''}
                            ${sw.status ? ' &middot; ' + esc(sw.status) : ''}
                        </div>
                    </div>
                    ${sw.temperature !== null && sw.temperature !== undefined ? `<span class="temp-badge temp-${sw.temperature_rating || 'good'}">${parseFloat(sw.temperature).toFixed(1)} °C</span>` : ''}
                    <span class="port-count">${sw.ports.length} Fiber-Port(s)</span>
                `;

                const body = document.createElement('div');
                body.className = 'switch-body open';

                header.addEventListener('click', () => {
                    header.querySelector('.arrow').classList.toggle('open');
                    body.classList.toggle('open');
                });

                body.innerHTML = buildPortTable(sw.ports);

                card.appendChild(header);
                card.appendChild(body);
                container.appendChild(card);
            });

            updateVendorFilter();
            updateDashboard();
            document.getElementById('filterBar').classList.add('visible');
        }

        function buildPortTable(ports) {
            let html = `<table class="port-table">
                <thead>
                    <tr>
                        <th class="sortable" data-sort="port" onclick="sortTable(this)">Port</th>
                        <th class="sortable" data-sort="status" onclick="sortTable(this)">Status</th>
                        <th class="sortable" data-sort="type" onclick="sortTable(this)">Typ</th>
                        <th class="sortable" data-sort="vendor" onclick="sortTable(this)">Vendor</th>
                        <th class="sortable" data-sort="part" onclick="sortTable(this)">Part Number</th>
                        <th>S/N</th>
                        <th class="sortable" data-sort="tx" onclick="sortTable(this)">Tx Power</th>
                        <th class="sortable" data-sort="rx" onclick="sortTable(this)">Rx Power</th>
                    </tr>
                </thead>
                <tbody>`;

            ports.forEach(p => {
                if (p.error) {
                    html += `<tr class="port-row" data-status="error" data-level="" data-vendor=""
                                 data-search="${escAttr(p.port)}">
                        <td>${esc(p.port)}</td>
                        <td colspan="7" style="color:var(--red)">Fehler: ${esc(p.error)}</td>
                    </tr>`;
                    return;
                }

                const rawStatus = (p.link_status || '').toLowerCase();
                const normalizedStatus = normalizeStatus(rawStatus);
                const statusClass = normalizedStatus;

                const txRx = p.tx_rx || {};
                const limits = txRx.limits || {};
                const statusArr = txRx.status || [];
                const firstStatus = statusArr[0] || {};

                const txPower = firstStatus['tx-power'] || {};
                const rxPower = firstStatus['rx-power'] || {};

                const txVal = txPower.value !== undefined ? parseFloat(txPower.value) : null;
                const rxVal = rxPower.value !== undefined ? parseFloat(rxPower.value) : null;
                const txLevel = txVal !== null ? getPowerLevel(txVal, limits, 'tx-power') : 'ok';
                const rxLevel = rxVal !== null ? getPowerLevel(rxVal, limits, 'rx-power') : 'ok';
                const worstLevel = (txLevel === 'alarm' || rxLevel === 'alarm') ? 'alarm'
                                 : (txLevel === 'warn' || rxLevel === 'warn') ? 'warn' : 'ok';

                const vendor = (p.vendor || '').trim();
                const searchStr = [p.port, p.link_status, p.type, vendor, p.part_number, p.serial_number].join(' ').toLowerCase();

                const rowId = 'port-' + Math.random().toString(36).substr(2, 9);

                html += `<tr class="port-row" data-status="${escAttr(normalizedStatus)}"
                             data-level="${escAttr(worstLevel)}" data-vendor="${escAttr(vendor)}"
                             data-search="${escAttr(searchStr)}"
                             data-port="${escAttr(p.port || '')}"
                             data-type="${escAttr(p.type || '')}"
                             data-part="${escAttr(p.part_number || '')}"
                             data-tx="${txVal !== null ? txVal : ''}"
                             data-rx="${rxVal !== null ? rxVal : ''}"
                             onclick="togglePortDetail('${rowId}')">
                    <td><strong>${esc(p.port)}</strong></td>
                    <td><span class="status-dot ${normalizedStatus}"></span>${esc(p.link_status || '-')}</td>
                    <td>${esc(p.type || '-')}</td>
                    <td>${esc(vendor || '-')}</td>
                    <td class="vendor-info">${esc(p.part_number || '-')}</td>
                    <td class="vendor-info">${esc(p.serial_number || '-')}</td>
                    <td>${renderPowerCell(txPower, limits, 'tx-power')}</td>
                    <td>${renderPowerCell(rxPower, limits, 'rx-power')}</td>
                </tr>`;
                html += buildPortDetailRow(rowId, txPower, rxPower, limits, txLevel, rxLevel);
            });

            html += '</tbody></table>';
            return html;
        }

        // --- Sorting ---

        function sortTable(th) {
            const table = th.closest('table');
            const tbody = table.querySelector('tbody');
            const sortKey = th.dataset.sort;
            const allThs = table.querySelectorAll('th.sortable');

            // Determine direction
            let dir = 'asc';
            if (th.classList.contains('sort-asc')) dir = 'desc';
            else if (th.classList.contains('sort-desc')) dir = '';

            // Clear all sort classes
            allThs.forEach(t => t.classList.remove('sort-asc', 'sort-desc'));

            if (!dir) return; // Reset to original order — just remove classes

            th.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');

            const rows = [...tbody.querySelectorAll('tr.port-row')];
            const isNumeric = (sortKey === 'tx' || sortKey === 'rx');

            rows.sort((a, b) => {
                let va = a.dataset[sortKey] || '';
                let vb = b.dataset[sortKey] || '';

                if (isNumeric) {
                    const na = va !== '' ? parseFloat(va) : -Infinity;
                    const nb = vb !== '' ? parseFloat(vb) : -Infinity;
                    return dir === 'asc' ? na - nb : nb - na;
                }

                va = va.toLowerCase();
                vb = vb.toLowerCase();
                if (va < vb) return dir === 'asc' ? -1 : 1;
                if (va > vb) return dir === 'asc' ? 1 : -1;
                return 0;
            });

            rows.forEach(r => {
                tbody.appendChild(r);
                // Move the detail row right after its port row
                const detailId = r.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                if (detailId) {
                    const detail = document.getElementById(detailId);
                    if (detail) tbody.appendChild(detail);
                }
            });
        }

        function normalizeStatus(raw) {
            if (!raw) return 'unknown';
            const s = raw.toLowerCase();
            if (s === 'up' || s === 'ok') return 'up';
            if (s === 'down' || s.includes('error') || s.includes('fail') || s.includes('disconnect')) return 'down';
            return 'unknown';
        }

        // --- Filters ---

        function updateDashboard() {
            let switches = 0, total = 0, ok = 0, warn = 0, alarm = 0, down = 0;

            for (const { fgtHost, switches: swList } of allResultData) {
                switches += swList.length;
                for (const sw of swList) {
                    for (const p of sw.ports) {
                        if (p.error) { down++; total++; continue; }

                        total++;
                        const rawStatus = (p.link_status || '').toLowerCase();
                        const normalized = normalizeStatus(rawStatus);
                        if (normalized === 'down') { down++; continue; }

                        const txRx = p.tx_rx || {};
                        const limits = txRx.limits || {};
                        const statusArr = txRx.status || [];
                        const firstStatus = statusArr[0] || {};
                        const txPower = firstStatus['tx-power'] || {};
                        const rxPower = firstStatus['rx-power'] || {};
                        const txVal = txPower.value !== undefined ? parseFloat(txPower.value) : null;
                        const rxVal = rxPower.value !== undefined ? parseFloat(rxPower.value) : null;
                        const txLevel = txVal !== null ? getPowerLevel(txVal, limits, 'tx-power') : 'ok';
                        const rxLevel = rxVal !== null ? getPowerLevel(rxVal, limits, 'rx-power') : 'ok';

                        if (txLevel === 'alarm' || rxLevel === 'alarm') alarm++;
                        else if (txLevel === 'warn' || rxLevel === 'warn') warn++;
                        else ok++;
                    }
                }
            }

            document.getElementById('dashSwitches').textContent = switches;
            document.getElementById('dashTotal').textContent = total;
            document.getElementById('dashOk').textContent = ok;
            document.getElementById('dashWarn').textContent = warn;
            document.getElementById('dashAlarm').textContent = alarm;
            document.getElementById('dashDown').textContent = down;
            document.getElementById('dashboard').classList.add('visible');
        }

        function updateVendorFilter() {
            const vendors = new Set();
            document.querySelectorAll('.port-row').forEach(r => {
                const v = r.dataset.vendor;
                if (v) vendors.add(v);
            });

            const sel = document.getElementById('filterVendor');
            const current = sel.value;
            sel.innerHTML = '<option value="">Alle</option>';
            [...vendors].sort().forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v;
                sel.appendChild(opt);
            });
            sel.value = current;
        }

        function applyFilters() {
            const text = document.getElementById('filterText').value.trim().toLowerCase();
            const status = document.getElementById('filterStatus').value;
            const level = document.getElementById('filterLevel').value;
            const vendor = document.getElementById('filterVendor').value;

            let visiblePorts = 0;
            let totalPorts = 0;

            document.querySelectorAll('.switch-card').forEach(card => {
                const rows = card.querySelectorAll('.port-row');
                let cardHasVisible = false;
                const cardSearch = card.dataset.searchbase || '';

                rows.forEach(row => {
                    totalPorts++;
                    let show = true;

                    if (text) {
                        const rowSearch = row.dataset.search || '';
                        if (!rowSearch.includes(text) && !cardSearch.includes(text)) show = false;
                    }

                    if (status && show) {
                        if (row.dataset.status !== status) show = false;
                    }

                    if (level && show) {
                        if (row.dataset.level !== level) show = false;
                    }

                    if (vendor && show) {
                        if (row.dataset.vendor !== vendor) show = false;
                    }

                    row.classList.toggle('port-row-hidden', !show);
                    // Also hide/show the associated detail row
                    const detailId = row.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                    if (detailId) {
                        const detail = document.getElementById(detailId);
                        if (detail) {
                            detail.classList.toggle('port-row-hidden', !show);
                            if (!show) detail.classList.remove('open');
                        }
                    }
                    if (show) {
                        visiblePorts++;
                        cardHasVisible = true;
                    }
                });

                card.classList.toggle('switch-card-hidden', !cardHasVisible);
            });

            const countEl = document.getElementById('filterCount');
            const hasFilter = text || status || level || vendor;
            countEl.textContent = hasFilter ? `${visiblePorts} / ${totalPorts} Ports` : '';
        }

        function renderPowerCell(power, limits, key) {
            if (!power || power.value === undefined || power.value === null) {
                return '<span style="color:var(--text-muted)">-</span>';
            }

            const val = parseFloat(power.value);
            const unit = power.unit || 'dBm';
            const level = getPowerLevel(val, limits, key);
            const levelClass = level === 'ok' ? 'level-ok' : level === 'warn' ? 'level-warn' : 'level-alarm';
            const barClass = level === 'ok' ? 'bar-ok' : level === 'warn' ? 'bar-warn' : 'bar-alarm';

            const minDb = -40, maxDb = 10;
            const pct = Math.max(0, Math.min(100, ((val - minDb) / (maxDb - minDb)) * 100));
            const limitsText = getLimitsText(limits, key);

            return `<div class="power-bar">
                <span class="power-value ${levelClass}">${val.toFixed(2)} ${esc(unit)}</span>
                <div class="power-bar-track" title="${escAttr(limitsText)}">
                    <div class="power-bar-fill ${barClass}" style="width:${pct}%"></div>
                </div>
            </div>`;
        }

        function getPowerLevel(val, limits, key) {
            if (!limits) return 'ok';
            try {
                const alarmHigh = limits.alarm?.high?.[key]?.value;
                const alarmLow = limits.alarm?.low?.[key]?.value;
                const warnHigh = limits.warning?.high?.[key]?.value;
                const warnLow = limits.warning?.low?.[key]?.value;

                if (alarmHigh !== undefined && val > parseFloat(alarmHigh)) return 'alarm';
                if (alarmLow !== undefined && val < parseFloat(alarmLow)) return 'alarm';
                if (warnHigh !== undefined && val > parseFloat(warnHigh)) return 'warn';
                if (warnLow !== undefined && val < parseFloat(warnLow)) return 'warn';
            } catch (e) { /* ignore */ }
            return 'ok';
        }

        function togglePortDetail(rowId) {
            const detail = document.getElementById(rowId);
            if (detail) detail.classList.toggle('open');
        }

        function buildPortDetailRow(rowId, txPower, rxPower, limits, txLevel, rxLevel) {
            const txVal = txPower?.value !== undefined ? parseFloat(txPower.value) : null;
            const rxVal = rxPower?.value !== undefined ? parseFloat(rxPower.value) : null;
            const txUnit = txPower?.unit || 'dBm';
            const rxUnit = rxPower?.unit || 'dBm';

            function limitsCard(title, key, currentVal, unit, level) {
                const ah = limits?.alarm?.high?.[key]?.value;
                const al = limits?.alarm?.low?.[key]?.value;
                const wh = limits?.warning?.high?.[key]?.value;
                const wl = limits?.warning?.low?.[key]?.value;

                const hasLimits = ah !== undefined || al !== undefined || wh !== undefined || wl !== undefined;
                if (!hasLimits && currentVal === null) return '';

                let h = `<div class="detail-card"><div class="detail-card-title">${esc(title)}</div>`;
                if (hasLimits) {
                    h += '<div class="detail-limits">';
                    if (ah !== undefined) h += `<span class="detail-limit-label">Alarm High</span><span class="detail-limit-value alarm">${parseFloat(ah).toFixed(2)} ${esc(unit)}</span>`;
                    if (wh !== undefined) h += `<span class="detail-limit-label">Warning High</span><span class="detail-limit-value warn">${parseFloat(wh).toFixed(2)} ${esc(unit)}</span>`;
                    if (wl !== undefined) h += `<span class="detail-limit-label">Warning Low</span><span class="detail-limit-value warn">${parseFloat(wl).toFixed(2)} ${esc(unit)}</span>`;
                    if (al !== undefined) h += `<span class="detail-limit-label">Alarm Low</span><span class="detail-limit-value alarm">${parseFloat(al).toFixed(2)} ${esc(unit)}</span>`;
                    h += '</div>';
                }
                if (currentVal !== null) {
                    const cls = level === 'alarm' ? 'alarm' : level === 'warn' ? 'warn' : 'ok';
                    h += `<div class="detail-current">
                        <span class="detail-current-label">Aktuell</span>
                        <span class="detail-current-value detail-limit-value ${cls}">${currentVal.toFixed(2)} ${esc(unit)}</span>
                    </div>`;
                }
                h += '</div>';
                return h;
            }

            const txCard = limitsCard('Tx Power', 'tx-power', txVal, txUnit, txLevel);
            const rxCard = limitsCard('Rx Power', 'rx-power', rxVal, rxUnit, rxLevel);

            if (!txCard && !rxCard) {
                return `<tr class="port-detail" id="${rowId}"><td colspan="8" style="color:var(--text-muted);padding:0.5rem 1rem;font-size:0.75rem">Keine Schwellwert-Daten verfügbar.</td></tr>`;
            }

            return `<tr class="port-detail" id="${rowId}">
                <td colspan="8">
                    <div class="detail-grid">${txCard}${rxCard}</div>
                </td>
            </tr>`;
        }

        function getLimitsText(limits, key) {
            if (!limits) return '';
            try {
                const ah = limits.alarm?.high?.[key]?.value;
                const al = limits.alarm?.low?.[key]?.value;
                const wh = limits.warning?.high?.[key]?.value;
                const wl = limits.warning?.low?.[key]?.value;
                const parts = [];
                if (al !== undefined) parts.push('Alarm Low: ' + al);
                if (wl !== undefined) parts.push('Warn Low: ' + wl);
                if (wh !== undefined) parts.push('Warn High: ' + wh);
                if (ah !== undefined) parts.push('Alarm High: ' + ah);
                return parts.join(' | ');
            } catch (e) { return ''; }
        }

        // --- Result Export ---

        function exportResultsCsv() {
            if (allResultData.length === 0) {
                showStatus('Keine Ergebnisse zum Exportieren vorhanden.', 'error');
                return;
            }

            const sep = ';';
            const headers = ['FortiGate', 'Switch', 'Serial', 'OS Version', 'Temp (°C)', 'Temp Rating',
                'Port', 'Status', 'Typ', 'Vendor',
                'Part Number', 'Serial Number', 'Tx Power (dBm)', 'Rx Power (dBm)', 'Level',
                'Tx Alarm High', 'Tx Warning High', 'Tx Warning Low', 'Tx Alarm Low',
                'Rx Alarm High', 'Rx Warning High', 'Rx Warning Low', 'Rx Alarm Low'];

            let csv = headers.join(sep) + '\n';

            for (const { fgtHost, switches } of allResultData) {
                for (const sw of switches) {
                    for (const p of sw.ports) {
                        if (p.error) continue;

                        const txRx = p.tx_rx || {};
                        const limits = txRx.limits || {};
                        const statusArr = txRx.status || [];
                        const firstStatus = statusArr[0] || {};
                        const txPower = firstStatus['tx-power'] || {};
                        const rxPower = firstStatus['rx-power'] || {};

                        const txVal = txPower.value !== undefined ? parseFloat(txPower.value).toFixed(2) : '';
                        const rxVal = rxPower.value !== undefined ? parseFloat(rxPower.value).toFixed(2) : '';

                        const txLevel = txVal !== '' ? getPowerLevel(parseFloat(txVal), limits, 'tx-power') : '';
                        const rxLevel = rxVal !== '' ? getPowerLevel(parseFloat(rxVal), limits, 'rx-power') : '';
                        const worstLevel = (txLevel === 'alarm' || rxLevel === 'alarm') ? 'alarm'
                                         : (txLevel === 'warn' || rxLevel === 'warn') ? 'warn'
                                         : (txLevel || rxLevel) ? 'ok' : '';

                        const lv = (path) => { try { return path?.value ?? ''; } catch { return ''; } };

                        const row = [
                            fgtHost, sw.name || sw.switch_id, sw.serial, sw.os_version || '',
                            sw.temperature !== null && sw.temperature !== undefined ? parseFloat(sw.temperature).toFixed(1) : '',
                            sw.temperature_rating || '',
                            p.port, p.link_status || '', p.type || '', (p.vendor || '').trim(),
                            p.part_number || '', p.serial_number || '', txVal, rxVal, worstLevel,
                            lv(limits.alarm?.high?.['tx-power']), lv(limits.warning?.high?.['tx-power']),
                            lv(limits.warning?.low?.['tx-power']), lv(limits.alarm?.low?.['tx-power']),
                            lv(limits.alarm?.high?.['rx-power']), lv(limits.warning?.high?.['rx-power']),
                            lv(limits.warning?.low?.['rx-power']), lv(limits.alarm?.low?.['rx-power']),
                        ];

                        csv += row.map(v => {
                            const s = String(v);
                            return (s.includes(sep) || s.includes('"') || s.includes('\n'))
                                ? '"' + s.replace(/"/g, '""') + '"' : s;
                        }).join(sep) + '\n';
                    }
                }
            }

            const bom = '\uFEFF';
            const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            a.download = `fiber-diagnose_${ts}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportResultsPdf() {
            if (allResultData.length === 0) {
                showStatus('Keine Ergebnisse zum Exportieren vorhanden.', 'error');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
            const pageWidth = doc.internal.pageSize.getWidth();
            let firstPage = true;

            // Title
            doc.setFontSize(16);
            doc.text('FortiSwitch Fiber Diagnose', pageWidth / 2, 15, { align: 'center' });
            doc.setFontSize(9);
            doc.setTextColor(100);
            doc.text('Erstellt am ' + new Date().toLocaleString('de-DE'), pageWidth / 2, 21, { align: 'center' });
            doc.setTextColor(0);

            let yPos = 28;

            for (const { fgtHost, switches } of allResultData) {
                for (const sw of switches) {
                    if (!firstPage && yPos > doc.internal.pageSize.getHeight() - 30) {
                        doc.addPage();
                        yPos = 15;
                    }

                    // Switch header
                    doc.setFontSize(11);
                    doc.setFont(undefined, 'bold');
                    doc.text(`${sw.name || sw.switch_id}`, 14, yPos);
                    doc.setFont(undefined, 'normal');
                    doc.setFontSize(8);
                    doc.setTextColor(100);
                    const tempStr = sw.temperature !== null && sw.temperature !== undefined ? `  |  Temp: ${parseFloat(sw.temperature).toFixed(1)} °C (${sw.temperature_rating || '-'})` : '';
                    doc.text(`FortiGate: ${fgtHost}  |  S/N: ${sw.serial}  |  FW: ${sw.os_version || '-'}  |  ${sw.status || ''}${tempStr}`, 14, yPos + 5);
                    doc.setTextColor(0);
                    yPos += 10;

                    // Port table
                    const headers = ['Port', 'Status', 'Typ', 'Vendor', 'Part Number', 'S/N',
                        'Tx (dBm)', 'Rx (dBm)', 'Level', 'Tx Warn L/H', 'Tx Alarm L/H', 'Rx Warn L/H', 'Rx Alarm L/H'];

                    const rows = sw.ports.filter(p => !p.error).map(p => {
                        const txRx = p.tx_rx || {};
                        const limits = txRx.limits || {};
                        const statusArr = txRx.status || [];
                        const firstStatus = statusArr[0] || {};
                        const txPower = firstStatus['tx-power'] || {};
                        const rxPower = firstStatus['rx-power'] || {};
                        const txVal = txPower.value !== undefined ? parseFloat(txPower.value).toFixed(2) : '-';
                        const rxVal = rxPower.value !== undefined ? parseFloat(rxPower.value).toFixed(2) : '-';

                        const txLvl = txVal !== '-' ? getPowerLevel(parseFloat(txVal), limits, 'tx-power') : '';
                        const rxLvl = rxVal !== '-' ? getPowerLevel(parseFloat(rxVal), limits, 'rx-power') : '';
                        const worst = (txLvl === 'alarm' || rxLvl === 'alarm') ? 'ALARM'
                                    : (txLvl === 'warn' || rxLvl === 'warn') ? 'WARN' : 'OK';

                        const lv = (path) => { try { return path?.value !== undefined ? parseFloat(path.value).toFixed(1) : '-'; } catch { return '-'; } };

                        const txWarnL = lv(limits.warning?.low?.['tx-power']);
                        const txWarnH = lv(limits.warning?.high?.['tx-power']);
                        const txAlarmL = lv(limits.alarm?.low?.['tx-power']);
                        const txAlarmH = lv(limits.alarm?.high?.['tx-power']);
                        const rxWarnL = lv(limits.warning?.low?.['rx-power']);
                        const rxWarnH = lv(limits.warning?.high?.['rx-power']);
                        const rxAlarmL = lv(limits.alarm?.low?.['rx-power']);
                        const rxAlarmH = lv(limits.alarm?.high?.['rx-power']);

                        return [
                            p.port, p.link_status || '-', p.type || '-', (p.vendor || '').trim() || '-',
                            p.part_number || '-', p.serial_number || '-',
                            txVal, rxVal, worst,
                            `${txWarnL} / ${txWarnH}`, `${txAlarmL} / ${txAlarmH}`,
                            `${rxWarnL} / ${rxWarnH}`, `${rxAlarmL} / ${rxAlarmH}`,
                        ];
                    });

                    doc.autoTable({
                        startY: yPos,
                        head: [headers],
                        body: rows,
                        theme: 'grid',
                        styles: { fontSize: 7, cellPadding: 1.5 },
                        headStyles: { fillColor: [30, 41, 59], textColor: [226, 232, 240], fontSize: 6.5, fontStyle: 'bold' },
                        columnStyles: {
                            0: { fontStyle: 'bold' },
                            6: { halign: 'right' },
                            7: { halign: 'right' },
                            8: { halign: 'center' },
                            9: { halign: 'center', fontSize: 6 },
                            10: { halign: 'center', fontSize: 6 },
                            11: { halign: 'center', fontSize: 6 },
                            12: { halign: 'center', fontSize: 6 },
                        },
                        didParseCell: function(data) {
                            if (data.section === 'body' && data.column.index === 8) {
                                const val = data.cell.raw;
                                if (val === 'ALARM') { data.cell.styles.textColor = [220, 38, 38]; data.cell.styles.fontStyle = 'bold'; }
                                else if (val === 'WARN') { data.cell.styles.textColor = [180, 83, 9]; data.cell.styles.fontStyle = 'bold'; }
                                else if (val === 'OK') { data.cell.styles.textColor = [22, 163, 74]; }
                            }
                        },
                        margin: { left: 14, right: 14 },
                    });

                    yPos = doc.lastAutoTable.finalY + 8;
                    firstPage = false;
                }
            }

            // Footer on each page
            const totalPages = doc.internal.getNumberOfPages();
            for (let i = 1; i <= totalPages; i++) {
                doc.setPage(i);
                doc.setFontSize(7);
                doc.setTextColor(150);
                doc.text(`Seite ${i} / ${totalPages}`, pageWidth - 14, doc.internal.pageSize.getHeight() - 7, { align: 'right' });
                doc.text('FortiSwitch Fiber Diagnose', 14, doc.internal.pageSize.getHeight() - 7);
            }

            const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            doc.save(`fiber-diagnose_${ts}.pdf`);
        }

        function esc(str) {
            if (str === null || str === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        function escAttr(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // Auto-load saved hosts on page load
        (function init() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) {
                try {
                    const arr = JSON.parse(data);
                    hosts = arr.map(h => ({
                        id: ++hostIdCounter,
                        host: h.host || '',
                        token: h.token || '',
                        vdom: h.vdom || 'root'
                    }));
                } catch (e) { /* ignore */ }
            }
            if (hosts.length === 0) {
                addHostRow();
            } else {
                renderHostTable();
            }
        })();
    </script>
</body>
</html>
