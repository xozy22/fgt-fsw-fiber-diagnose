<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="fiber1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <linearGradient id="fiber2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#2d3748" stroke-width="1.5"/>
  <!-- SFP module body -->
  <rect x="12" y="20" width="40" height="24" rx="3" fill="#2d3748" stroke="#4a5568" stroke-width="1"/>
  <rect x="14" y="22" width="36" height="20" rx="2" fill="#1e293b"/>
  <!-- Fiber ports (two circles = Tx/Rx) -->
  <circle cx="24" cy="32" r="5" fill="#0f172a" stroke="#4a5568" stroke-width="0.8"/>
  <circle cx="40" cy="32" r="5" fill="#0f172a" stroke="#4a5568" stroke-width="0.8"/>
  <!-- Tx light (green/cyan) -->
  <circle cx="24" cy="32" r="3" fill="#00d4aa" filter="url(#glow)" opacity="0.9"/>
  <!-- Rx light (amber) -->
  <circle cx="40" cy="32" r="3" fill="#f59e0b" filter="url(#glow)" opacity="0.9"/>
  <!-- Tx label -->
  <text x="24" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" font-weight="bold" fill="#0f172a">Tx</text>
  <!-- Rx label -->
  <text x="40" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" font-weight="bold" fill="#0f172a">Rx</text>
  <!-- Fiber strands coming out left -->
  <path d="M12 29 Q6 29 4 24" stroke="url(#fiber1)" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M12 35 Q6 35 4 40" stroke="url(#fiber2)" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Signal bars (top right corner) -->
  <rect x="46" y="12" width="3" height="4" rx="0.5" fill="#00d4aa" opacity="0.5"/>
  <rect x="50" y="10" width="3" height="6" rx="0.5" fill="#00d4aa" opacity="0.7"/>
  <rect x="54" y="8" width="3" height="8" rx="0.5" fill="#00d4aa" opacity="0.9"/>
  <!-- Status dot -->
  <circle cx="14" cy="12" r="3" fill="#00d4aa" filter="url(#glow)" opacity="0.8"/>
</svg>
